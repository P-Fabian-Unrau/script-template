name: Build LaTeX

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            main-de.tex
            main-en.tex

      - uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: output/**/*.pdf